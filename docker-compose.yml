version: "3.8"

services:
  api:
    build: .
    container_name: talentid-api
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=TalentID API
      - DEBUG=false
      - DATABASE_URL=sqlite+aiosqlite:///./talentid.db
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CORS_ORIGINS=http://localhost:3000
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

